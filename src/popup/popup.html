<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../styles/app.css">
    <title>GrammarLens</title>
  </head>
  <body>
    <main class="shell">
      <section class="brand">
        <span class="mark">G</span>
        <div>
          <div class="title">GrammarLens</div>
          <div class="muted">Grammar microscope for this page</div>
        </div>
      </section>
      <label class="field">
        <span>Translate to</span>
        <input id="target-language" list="language-options" placeholder="e.g. Vietnamese, English, Japanese">
      </label>
      <label class="field">
        <span>Explain grammar in</span>
        <input id="explanation-language" list="language-options" placeholder="Mother tongue, e.g. Vietnamese">
      </label>
      <datalist id="language-options">
        <option value="Vietnamese"></option>
        <option value="English"></option>
        <option value="Spanish"></option>
        <option value="French"></option>
        <option value="Japanese"></option>
        <option value="Korean"></option>
        <option value="Chinese"></option>
      </datalist>
      <div class="actions">
        <button id="analyze-button">Analyze article</button>
        <button id="options-button" type="button">Settings</button>
      </div>
      <div id="status" class="status" role="status"></div>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
