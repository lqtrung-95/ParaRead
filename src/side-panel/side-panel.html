<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../styles/app.css">
    <link rel="stylesheet" href="../styles/reader.css">
    <link rel="stylesheet" href="../styles/lens.css">
    <link rel="stylesheet" href="../styles/language-selector.css">
    <title>GrammarLens Reader</title>
  </head>
  <body>
    <header class="reader-header">
      <section class="brand">
        <span class="mark">G</span>
        <div>
          <div id="title" class="title">GrammarLens</div>
          <div id="meta" class="muted">Open an article and analyze it here.</div>
        </div>
      </section>
      <div id="reader-insights" class="reader-insights">Read real articles with sentence-level grammar lenses.</div>
      <section class="reader-setup" aria-label="Reader setup">
        <label class="compact-field">
          <span>Learning language</span>
          <input id="source-language" class="language-input" placeholder="Auto" autocomplete="off">
        </label>
        <label class="compact-field">
          <span>Explain in</span>
          <input id="explanation-language" class="language-input" placeholder="Vietnamese" autocomplete="off">
        </label>
        <button id="analyze-button" type="button">Analyze article</button>
        <div class="reader-actions">
          <button id="selection-button" class="secondary-button" type="button">Explain selection</button>
          <button id="inline-button" class="secondary-button" type="button">Insert inline</button>
          <button id="export-button" class="secondary-button" type="button">Export CSV</button>
        </div>
        <div class="provider-row">
          <div id="status" class="panel-status" role="status"></div>
          <button id="provider-settings-button" class="provider-settings-button" type="button">Settings</button>
        </div>
      </section>
      <nav class="reader-tabs" aria-label="Reader views">
        <button id="read-tab" class="tab-button active" type="button">Read</button>
        <button id="review-tab" class="tab-button" type="button">Review</button>
        <button id="library-tab" class="tab-button" type="button">Library</button>
      </nav>
    </header>
    <main id="cards" class="card-list"></main>
    <script type="module" src="./side-panel.js"></script>
  </body>
</html>
